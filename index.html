<!DOCTYPE html>

<head>

<title>Borne de recharge — Suivi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --font-sans: 'DM Sans', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #5a5a5a;
    --color-text-tertiary: #8a8a8a;
    --color-bg: #ffffff;
    --color-bg-2: #f5f5f5;
    --color-bg-3: #e0e0e0;
    --color-border: #d0d0d0;
    --color-border-light: #e5e5e5;
    --radius-md: 10px;
    --radius-lg: 14px;
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --green-dark: #085041;
    --blue: #2563EB;
    --blue-bg: #EFF6FF;
    --blue-dark: #1E3A5F;
    --amber: #D97706;
    --amber-bg: #FFFBEB;
    --amber-dark: #78350F;
    --red: #D85A30;
    --red-bg: #FAECE7;
    --red-dark: #712B13;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #e8e8e8;
      --color-text-secondary: #a0a0a0;
      --color-text-tertiary: #606060;
      --color-bg: #1a1a1a;
      --color-bg-2: #252525;
      --color-bg-3: #333;
      --color-border: #444;
      --color-border-light: #2e2e2e;
      --green-bg: #0d2e24;
      --green-dark: #8ee4c0;
      --blue-bg: #1a2744;
      --blue-dark: #93bbfc;
      --amber-bg: #2e2510;
      --amber-dark: #fcd580;
      --red-bg: #2e1a14;
      --red-dark: #f0a080;
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:var(--font-sans); background:var(--color-bg); color:var(--color-text-primary); min-height:100vh; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }
  .app { max-width:420px; margin:0 auto; padding:1.25rem 1rem 3rem; padding:calc(1.25rem + env(safe-area-inset-top, 0px)) 1rem calc(3rem + env(safe-area-inset-bottom, 0px)); }

  input, textarea, select {
    font-family:var(--font-sans); font-size:16px; padding:0.75rem 0.85rem;
    border:1px solid var(--color-border-light); border-radius:var(--radius-md);
    background:var(--color-bg); color:var(--color-text-primary);
    outline:none; transition:border-color 0.15s; width:100%;
    -webkit-appearance:none; appearance:none;
  }
  input:focus, textarea:focus, select:focus { border-color:var(--blue); }
  button {
    font-family:var(--font-sans); font-size:14px;
    border:1px solid var(--color-border-light); border-radius:var(--radius-md);
    background:var(--color-bg); color:var(--color-text-primary);
    cursor:pointer; transition:all 0.15s ease; min-height:44px;
  }
  button:hover, button:active { background:var(--color-bg-2); }

  /* Header */
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; padding-bottom:0.85rem; border-bottom:1px solid var(--color-border-light); }
  .header-title { font-size:17px; font-weight:600; letter-spacing:-0.3px; }
  .header-sub { font-size:12px; color:var(--color-text-tertiary); margin-top:2px; }

  /* Commun */
  .field-label { display:block; font-size:13px; color:var(--color-text-secondary); margin-bottom:6px; font-weight:500; }
  .mb-3 { margin-bottom:0.75rem; }
  .mb-4 { margin-bottom:1rem; }
  .hidden { display:none !important; }
  .spinner { width:36px; height:36px; border:3px solid var(--color-border-light); border-top-color:var(--blue); border-radius:50%; margin:2rem auto; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes glow { 0%,100%{ box-shadow:0 0 20px rgba(37,99,235,0.15); } 50%{ box-shadow:0 0 35px rgba(37,99,235,0.3); } }

  /* Login */
  .login-screen { padding:1.5rem 0; }
  .login-logo { font-size:52px; text-align:center; margin-bottom:1rem; }
  .login-title { font-size:22px; font-weight:600; text-align:center; margin-bottom:4px; letter-spacing:-0.5px; }
  .login-sub { font-size:14px; color:var(--color-text-secondary); text-align:center; margin-bottom:2rem; line-height:1.6; }
  .pin-input { text-align:center; font-family:var(--font-mono); font-size:24px; letter-spacing:12px; padding:0.85rem 1rem; }
  .btn-login { display:block; width:100%; padding:1rem; background:var(--blue); color:#fff; border:none; border-radius:var(--radius-md); font-weight:500; font-size:15px; cursor:pointer; }
  .btn-login:hover { opacity:0.9; background:var(--blue); }
  .btn-login:disabled { background:var(--color-bg-3); color:var(--color-text-tertiary); cursor:default; opacity:1; }
  .login-error { background:var(--red-bg); color:var(--red-dark); padding:0.7rem 1rem; border-radius:var(--radius-md); font-size:13px; text-align:center; margin-top:0.75rem; }

  /* Accueil */
  .welcome-screen { text-align:center; padding:2rem 0; }
  .welcome-avatar { width:56px; height:56px; border-radius:50%; background:var(--blue-bg); display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; font-size:24px; }
  .welcome-hello { font-size:14px; color:var(--color-text-secondary); margin-bottom:2px; }
  .welcome-name { font-size:20px; font-weight:600; margin-bottom:1.75rem; letter-spacing:-0.3px; }
  .welcome-btn {
    display:flex; align-items:center; gap:14px; width:100%; padding:1.1rem 1rem;
    border-radius:var(--radius-lg); font-size:15px; font-weight:500;
    margin-bottom:12px; cursor:pointer; transition:all 0.2s; text-align:left;
  }
  .welcome-btn-primary { background:var(--blue); color:#fff; border:none; }
  .welcome-btn-primary:hover { opacity:0.9; background:var(--blue); }
  .welcome-btn-secondary { background:var(--color-bg-2); color:var(--color-text-primary); border:1px solid var(--color-border-light); }
  .welcome-btn-secondary:hover { background:var(--color-bg-3); }
  .welcome-btn-logout { background:transparent; color:var(--color-text-tertiary); border:none; font-size:13px; margin-top:0.5rem; min-height:36px; }
  .btn-icon-circle { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .btn-icon-circle-blue { background:rgba(255,255,255,0.2); }
  .btn-icon-circle-gray { background:var(--color-bg-3); }
  .btn-text { flex:1; }
  .btn-label { display:block; font-size:15px; font-weight:500; }
  .btn-sub { display:block; font-size:12px; opacity:0.7; margin-top:2px; }

  /* Charge en cours */
  .charging-banner {
    background:var(--blue-bg); border-radius:var(--radius-lg);

  .charging-elapsed { font-size:44px; font-weight:600; color:var(--blue-dark); font-family:var(--font-mono); letter-spacing:2px; margin-top:0.5rem; }

  .charging-cost-sub { font-size:11px; color:var(--amber-dark); opacity:0.7; margin-top:2px; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1.25rem; }
  .detail-card { background:var(--color-bg-2); border-radius:var(--radius-md); padding:0.75rem; }
  .detail-label { font-size:11px; color:var(--color-text-tertiary); margin-bottom:3px; text-transform:uppercase; letter-spacing:0.5px; }
  .detail-value { font-size:14px; font-weight:500; }
  .btn-stop { width:100%; padding:1rem; background:var(--red); color:#fff; border:none; border-radius:var(--radius-md); font-weight:500; font-size:15px; cursor:pointer; }
  .btn-stop:hover { opacity:0.9; background:var(--red); }

  /* Récap */
  .summary-screen { padding:1rem 0; }
  .summary-icon { width:64px; height:64px; border-radius:50%; background:var(--green-bg); display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; font-size:28px; }
  .summary-title { font-size:18px; font-weight:600; text-align:center; margin-bottom:0.25rem; }
  .summary-sub { font-size:13px; color:var(--color-text-secondary); text-align:center; margin-bottom:1.5rem; }
  .summary-card {
    background:var(--color-bg-2); border-radius:var(--radius-lg); padding:1.25rem;
    margin-bottom:1.25rem;
  }
  .summary-row { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 0; }
  .summary-row:not(:last-child) { border-bottom:1px solid var(--color-border-light); }
  .summary-row-label { font-size:13px; color:var(--color-text-secondary); }
  .summary-row-value { font-size:14px; font-weight:500; text-align:right; }
  .summary-total { font-size:18px; font-weight:700; color:var(--blue); }
  .btn-home { width:100%; padding:1rem; background:var(--blue); color:#fff; border:none; border-radius:var(--radius-md); font-weight:500; font-size:15px; cursor:pointer; }
  .btn-home:hover { opacity:0.9; background:var(--blue); }

  /* Historique */
  .search-box { position:relative; margin-bottom:1rem; }
  .search-icon { position:absolute; left:0.7rem; top:50%; transform:translateY(-50%); font-size:14px; color:var(--color-text-tertiary); pointer-events:none; }
  .search-box input { padding-left:2.1rem; }
  .history-count { font-size:13px; color:var(--color-text-tertiary); margin-bottom:10px; }
  .history-item {
    background:var(--color-bg); border:1px solid var(--color-border-light); border-radius:var(--radius-md);
    padding:0.75rem 0.85rem; display:flex; align-items:center; gap:10px;
    margin-bottom:6px; transition:background 0.1s;
  }
  .history-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; background:var(--blue-bg); }
  .history-name { font-size:13px; font-weight:500; }
  .history-meta { font-size:11px; color:var(--color-text-tertiary); margin-top:1px; }
  .history-right { flex-shrink:0; text-align:right; }
  .history-date { font-size:12px; font-weight:500; }
  .history-cost { font-size:12px; color:var(--blue); font-weight:600; font-family:var(--font-mono); }

  .btn-row { display:flex; gap:8px; }
  .btn-back { flex:1; padding:0.85rem; font-size:14px; }

  /* Point de charge — disposition gauche/droite comme la borne physique */
  .point-row { display:flex; gap:16px; align-items:stretch; }
  .point-btn {
    flex:1; padding:1.25rem 0.5rem; border:2px solid var(--color-border-light);
    border-radius:var(--radius-lg); background:var(--color-bg); cursor:pointer;
    text-align:center; transition:all 0.15s; min-height:80px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  }
  .point-btn .point-number {
    width:44px; height:44px; border-radius:50%; background:var(--color-bg-2);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:700; font-family:var(--font-mono); transition:all 0.15s;
  }
  .point-btn .point-label { font-size:11px; color:var(--color-text-tertiary); margin-top:2px; }
  .point-btn.point-active { border-color:var(--blue); background:var(--blue-bg); }
  .point-btn.point-active .point-number { background:var(--blue); color:#fff; }
  .point-btn.point-active .point-label { color:var(--blue-dark); font-weight:500; }
  .point-btn.point-busy { opacity:0.5; cursor:not-allowed; border-color:var(--color-border-light); background:var(--color-bg); }
  .point-btn.point-busy .point-number { background:var(--color-bg-3); color:var(--color-text-tertiary); }
  .point-btn.point-busy .point-label { color:var(--red); font-weight:500; }
  .point-busy-user { font-size:10px; color:var(--red); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }

  /* Dropdown recherche */
  .search-select { position:relative; }
  .search-select-trigger {
    display:flex; align-items:center; justify-content:space-between;
    padding:0.75rem 0.85rem; border:1px solid var(--color-border-light);
    border-radius:var(--radius-md); background:var(--color-bg); cursor:pointer;
    font-size:16px; min-height:48px; transition:border-color 0.15s;
  }
  .search-select-trigger.has-value { color:var(--color-text-primary); }
  .search-select-trigger.no-value { color:var(--color-text-tertiary); }
  .search-select-trigger:focus, .search-select-trigger.open { border-color:var(--blue); }
  .search-select-arrow { font-size:12px; color:var(--color-text-tertiary); transition:transform 0.15s; }
  .search-select-trigger.open .search-select-arrow { transform:rotate(180deg); }
  .search-select-dropdown {
    position:absolute; top:calc(100% + 4px); left:0; right:0;
    background:var(--color-bg); border:1px solid var(--color-border);
    border-radius:var(--radius-md); box-shadow:0 8px 24px rgba(0,0,0,0.12);
    z-index:50; max-height:260px; display:flex; flex-direction:column;
    overflow:hidden;
  }
  .search-select-search {
    padding:0.65rem 0.85rem; border:none; border-bottom:1px solid var(--color-border-light);
    font-size:15px; outline:none; background:var(--color-bg); color:var(--color-text-primary);
    border-radius:0; width:100%;
  }
  .search-select-list { overflow-y:auto; flex:1; }
  .search-select-option {
    padding:0.7rem 0.85rem; font-size:15px; cursor:pointer;
    transition:background 0.1s; border-bottom:1px solid var(--color-border-light);
  }
  .search-select-option:last-child { border-bottom:none; }
  .search-select-option:hover, .search-select-option:active { background:var(--blue-bg); }
  .search-select-option.selected { color:var(--blue); font-weight:500; }
  .search-select-empty { padding:1rem; text-align:center; font-size:13px; color:var(--color-text-tertiary); }
</style>

<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">⚡ Borne de recharge</div>
      <div class="header-sub" id="headerSub">Identification</div>
    </div>
    <div id="headerBack" class="hidden">
      <button onclick="goBack()" style="padding:10px 18px;font-size:14px">← Retour</button>
    </div>
  </div>

  <div id="screenLogin"></div>
  <div id="screenHome" class="hidden"></div>
  <div id="screenCharging" class="hidden"></div>
  <div id="screenEnd" class="hidden"></div>
  <div id="screenSummary" class="hidden"></div>
  <div id="screenHistory" class="hidden"></div>
</div>

<script>
// ============================================================
// CONFIG AIRTABLE
// ============================================================
const AIRTABLE_TOKEN = "patfxRbzwpYU6ovpN.b3a0edd9d1e8417fddf7f3734bb67569375a0861e9dfec3c766415362cc29862";
const BASE_ID        = "app2Zz2G7FGpd8ws2";
const TBL_USERS      = "tbliIt8NvjctJtp5O";
const TBL_CHARGES    = "tblvDQJ3s3hPnh2S0";

// Coût = 0.20 €/kWh × 11 kW / 60 min = 0.036667 €/min
const COST_PER_MINUTE = 0.20 * (11 / 60);
const COST_PER_KWH = 0.20;

let state = {
  screen: "login",
  users: [],
  currentUser: null,        // { id, nom }
  selectedUserName: "",
  pin: "",
  loginError: "",
  // Point de charge
  selectedPoint: "",         // "Point 1" ou "Point 2"
  busyPoints: [],            // [{ point, utilisateur }]
  busyLoading: false,
  // Charge en cours
  chargeStartTime: null,
  chargeRecordId: null,
  elapsedInterval: null,
  // Fin de charge
  endDureeMin: 0,
  endCostEstime: 0,
  compteurKwh: "",
  previousCompteur: null,
  // Récap
  summary: null,
  // Historique
  history: [],
};

// ============================================================
// API AIRTABLE
// ============================================================
async function api(path, options = {}) {
  const url = `https://api.airtable.com/v0/${BASE_ID}/${path}`;
  const res = await fetch(url, {
    ...options,
    mode: "cors",
    headers: {
      "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
      "Content-Type": "application/json",
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    console.error("Airtable error:", res.status, err);
    throw new Error(`Airtable ${res.status}: ${err}`);
  }
  return res.json();
}

async function getUsers() {
  const d = await api(`${TBL_USERS}?fields[]=Nom&fields[]=CodePIN&sort[0][field]=Nom&sort[0][direction]=asc`);
  return d.records.map(r => ({
    id: r.id,
    nom: r.fields["Nom"] || "",
    pin: r.fields["CodePIN"] || ""
  })).filter(u => u.nom);
}

async function getBusyPoints() {
  const formula = encodeURIComponent(`AND({DateFin}="",{Utilisateur}!="INITIAL")`);
  const d = await api(`${TBL_CHARGES}?filterByFormula=${formula}&fields[]=PointDeCharge&fields[]=Utilisateur`);
  return d.records.map(r => ({
    point: r.fields["PointDeCharge"] || "",
    utilisateur: r.fields["Utilisateur"] || ""
  }));
}

async function getActiveChargeForUser(userName) {
  const formula = encodeURIComponent(`AND({Utilisateur}="${userName}",{DateFin}="")`);
  const d = await api(`${TBL_CHARGES}?filterByFormula=${formula}&maxRecords=1&fields[]=DateDebut&fields[]=PointDeCharge`);
  if (!d.records.length) return null;
  const r = d.records[0];
  return { id: r.id, dateDebut: r.fields["DateDebut"] || null, point: r.fields["PointDeCharge"] || "" };
}

async function createCharge(userName, point) {
  return api(TBL_CHARGES, {
    method: "POST",
    body: JSON.stringify({
      fields: {
        "Utilisateur": userName,
        "DateDebut": new Date().toISOString(),
        "PointDeCharge": point
      },
      typecast: true
    })
  });
}

async function getLastCompteur(point) {
  const formula = encodeURIComponent(`AND({PointDeCharge}="${point}",{CompteurKwh}>0)`);
  const d = await api(`${TBL_CHARGES}?filterByFormula=${formula}&sort[0][field]=DateDebut&sort[0][direction]=desc&maxRecords=1&fields[]=CompteurKwh`);
  if (!d.records.length) return null;
  return d.records[0].fields["CompteurKwh"] || null;
}

async function closeCharge(recordId, dureeMinutes, coutEstime, compteurKwh, consoReelle, coutReel) {
  const fields = {
    "DateFin": new Date().toISOString(),
    "DureeMinutes": dureeMinutes,
    "CoutEstime": coutEstime
  };
  if (compteurKwh !== null && compteurKwh !== undefined) {
    fields["CompteurKwh"] = compteurKwh;
  }
  if (consoReelle !== null && consoReelle !== undefined) {
    fields["ConsoReelle"] = consoReelle;
  }
  if (coutReel !== null && coutReel !== undefined) {
    fields["CoutReel"] = coutReel;
  }
  return api(`${TBL_CHARGES}/${recordId}`, {
    method: "PATCH",
    body: JSON.stringify({ fields })
  });
}

async function getUserCharges(userName) {
  const formula = encodeURIComponent(`AND({Utilisateur}="${userName}",{Utilisateur}!="INITIAL")`);
  const d = await api(`${TBL_CHARGES}?filterByFormula=${formula}&sort[0][field]=DateDebut&sort[0][direction]=desc&maxRecords=100`);
  return d.records.map(r => ({
    id: r.id,
    dateDebut: r.fields["DateDebut"] || null,
    dateFin: r.fields["DateFin"] || null,
    duree: r.fields["DureeMinutes"] || 0,
    cout: r.fields["CoutEstime"] || 0,
    compteur: r.fields["CompteurKwh"] || null,
    consoReelle: r.fields["ConsoReelle"] || null,
    point: r.fields["PointDeCharge"] || ""
  }));
}

// ============================================================
// FORMAT
// ============================================================
const fmtDate = d => d ? new Date(d).toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" }) : "—";
const fmtTime = d => d ? new Date(d).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }) : "—";
function fmtDuration(mins) {
  if (!mins) return "—";
  const h = Math.floor(mins / 60), m = Math.round(mins % 60);
  return h === 0 ? `${m} min` : `${h}h${String(m).padStart(2, "0")}`;
}
function fmtCost(val) {
  return Number(val).toFixed(2).replace(".", ",") + " €";
}
function elapsed(t) {
  const s = Math.floor((Date.now() - new Date(t)) / 1000);
  return `${String(Math.floor(s / 3600)).padStart(2, "0")}:${String(Math.floor((s % 3600) / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
}
function elapsedMinutes(t) {
  return (Date.now() - new Date(t)) / 60000;
}

// ============================================================
// RENDER
// ============================================================
const show = id => document.getElementById(id).classList.remove("hidden");
const hide = id => document.getElementById(id).classList.add("hidden");
const el = id => document.getElementById(id);

function hideAll() {
  ["screenLogin", "screenHome", "screenCharging", "screenEnd", "screenSummary", "screenHistory"].forEach(hide);
}

function setHeader(sub, showBack) {
  el("headerSub").textContent = sub;
  el("headerBack").classList.toggle("hidden", !showBack);
}

function goBack() {
  if (state.elapsedInterval) clearInterval(state.elapsedInterval);
  if (state.screen === "history") {
    state.screen = "home";
  } else if (state.screen === "charging" || state.screen === "end") {
    // On ne peut pas revenir en arrière pendant une charge
    return;
  } else {
    state.screen = "home";
  }
  render();
}

function render() {
  hideAll();
  const screens = {
    login:    ["Identification",       false, renderLogin,    "screenLogin"],
    home:     [state.currentUser ? `Bonjour ${state.currentUser.nom}` : "Accueil", false, renderHome, "screenHome"],
    charging: ["Recharge en cours",    false, renderCharging, "screenCharging"],
    end:      ["Fin de recharge",      false, renderEnd,      "screenEnd"],
    summary:  ["Recharge terminée",    false, renderSummary,  "screenSummary"],
    history:  ["Mon historique",        true,  renderHistory,  "screenHistory"],
  };
  const [sub, back, fn, screenId] = screens[state.screen] || screens.login;
  setHeader(sub, back);
  fn();
  show(screenId);
}

let dropdownOpen = false;

function toggleUserDropdown() {
  dropdownOpen ? closeUserDropdown() : openUserDropdown();
}

function openUserDropdown() {
  dropdownOpen = true;
  const container = el("userDropdown");
  const trigger = el("userTrigger");
  if (trigger) trigger.classList.add("open");

  // Supprimer un dropdown existant
  const existing = container.querySelector(".search-select-dropdown");
  if (existing) existing.remove();

  const dd = document.createElement("div");
  dd.className = "search-select-dropdown";
  dd.innerHTML = `
    <input type="text" class="search-select-search" id="userSearchInput"
           placeholder="Tapez un nom..." oninput="filterUserDropdown(this.value)" autocomplete="off">
    <div class="search-select-list" id="userSearchList"></div>
  `;
  container.appendChild(dd);
  filterUserDropdown("");
  setTimeout(() => { const inp = el("userSearchInput"); if (inp) inp.focus(); }, 50);

  // Fermer si clic en dehors
  setTimeout(() => document.addEventListener("click", onClickOutsideDropdown, true), 10);
}

function closeUserDropdown() {
  dropdownOpen = false;
  const trigger = el("userTrigger");
  if (trigger) trigger.classList.remove("open");
  const container = el("userDropdown");
  const dd = container?.querySelector(".search-select-dropdown");
  if (dd) dd.remove();
  document.removeEventListener("click", onClickOutsideDropdown, true);
}

function onClickOutsideDropdown(e) {
  const container = el("userDropdown");
  if (container && !container.contains(e.target)) closeUserDropdown();
}

function filterUserDropdown(search) {
  const list = el("userSearchList");
  if (!list) return;
  const s = search.toLowerCase();
  const filtered = state.users.filter(u => !s || u.nom.toLowerCase().includes(s));
  if (!filtered.length) {
    list.innerHTML = `<div class="search-select-empty">Aucun résultat</div>`;
    return;
  }
  list.innerHTML = filtered.map(u => `
    <div class="search-select-option ${state.selectedUserName === u.nom ? 'selected' : ''}"
         onclick="selectUser('${u.nom.replace(/'/g, "\\'")}')">
      ${u.nom}
    </div>`).join("");
}

function selectUser(nom) {
  state.selectedUserName = nom;
  state.loginError = "";
  closeUserDropdown();
  // Mettre à jour le trigger
  const trigger = el("userTrigger");
  if (trigger) {
    trigger.classList.remove("no-value");
    trigger.classList.add("has-value");
    trigger.querySelector("span").textContent = nom;
  }
  updateLoginBtn();
}

function onUserSelect(val) {
  state.selectedUserName = val;
  state.loginError = "";
  updateLoginBtn();
}

function onPinInput(val) {
  state.pin = val;
  state.loginError = "";
  updateLoginBtn();
}

function updateLoginBtn() {
  const btn = el("btnLogin");
  if (btn) btn.disabled = !(state.selectedUserName && state.pin);
}

async function doLogin() {
  if (!state.selectedUserName || !state.pin) return;
  const user = state.users.find(u => u.nom === state.selectedUserName);
  if (!user) { state.loginError = "Utilisateur introuvable."; render(); return; }
  if (user.pin !== state.pin) {
    state.loginError = "Code personnel incorrect.";
    state.pin = "";
    render();
    return;
  }
  // Connexion réussie
  state.currentUser = { id: user.id, nom: user.nom };
  state.loginError = "";
  state.pin = "";
  state.selectedUserName = "";
  state.busyPoints = [];

  // Vérifier si l'utilisateur a une charge en cours
  el("screenLogin").innerHTML = `<div class="spinner"></div><p style="text-align:center;font-size:14px;color:var(--color-text-secondary)">Connexion...</p>`;
  try {
    const active = await getActiveChargeForUser(user.nom);
    if (active) {
      state.chargeRecordId = active.id;
      state.chargeStartTime = active.dateDebut;
      state.selectedPoint = active.point;
      state.screen = "charging";
    } else {
      state.screen = "home";
    }
  } catch (e) {
    console.error("Erreur vérification charge active:", e);
    state.screen = "home";
  }
  render();
}

async function loadBusyPoints() {
  state.busyLoading = true;
  const zone = el("screenHome");
  // Petit texte pendant le chargement
  try {
    state.busyPoints = await getBusyPoints();
    state.busyPoints._loaded = true;
    // Si un point sélectionné est maintenant occupé, le désélectionner
    if (state.selectedPoint && state.busyPoints.find(b => b.point === state.selectedPoint)) {
      state.selectedPoint = "";
    }
  } catch (e) {
    console.error("Erreur chargement points occupés:", e);
    state.busyPoints = [];
  }
  state.busyLoading = false;
  if (state.screen === "home") renderHome();
}

function pickPoint(p) {
  state.selectedPoint = p;
  document.querySelectorAll(".point-btn").forEach(b => {
    b.classList.toggle("point-active", b.dataset.point === p);

  if (btn) { btn.style.opacity = "1"; btn.style.pointerEvents = "auto"; }
}

function logout() {
  if (state.elapsedInterval) clearInterval(state.elapsedInterval);
  state.currentUser = null;
  state.selectedPoint = "";
  state.busyPoints = [];
  state.screen = "login";
  render();

async function startCharge() {
  if (!state.selectedPoint) return;
  el("screenHome").innerHTML = `<div class="spinner"></div><p style="text-align:center;font-size:14px;color:var(--color-text-secondary)">Démarrage de la recharge...</p>`;
  try {
    const rec = await createCharge(state.currentUser.nom, state.selectedPoint);
    state.chargeRecordId = rec.id;
    state.chargeStartTime = rec.fields["DateDebut"] || new Date().toISOString();
    state.screen = "charging";
    render();
  } catch (e) {
    alert("Erreur lors du démarrage de la recharge.");
    console.error(e);
    render();
  }
}

// ============================================================
// ECRAN CHARGE EN COURS
// ============================================================
function renderCharging() {
  const t = state.chargeStartTime;
  const mins = elapsedMinutes(t);
  const cost = COST_PER_MINUTE * mins;

  el("screenCharging").innerHTML = `
    <div class="charging-banner">
      <div class="charging-label"><span class="pulse-dot"></span>Recharge en cours — ${state.selectedPoint}</div>
      <div class="charging-elapsed" id="elapsedDisplay">${elapsed(t)}</div>
    </div>

    <div class="charging-cost-box">
      <div class="charging-cost-label">Coût estimé</div>
      <div class="charging-cost-value" id="costDisplay">${fmtCost(cost)}</div>
      <div class="charging-cost-sub">0,20 €/kWh × 11 kW</div>
    </div>

    <div class="detail-grid">
      <div class="detail-card">
        <div class="detail-label">Utilisateur</div>
        <div class="detail-value">${state.currentUser.nom}</div>
      </div>
      <div class="detail-card">
        <div class="detail-label">Début</div>
        <div class="detail-value">${fmtTime(t)}</div>
      </div>
      <div class="detail-card">
        <div class="detail-label">Point</div>
        <div class="detail-value">${state.selectedPoint}</div>
      </div>
      <div class="detail-card">
        <div class="detail-label">Date</div>
        <div class="detail-value">${fmtDate(t)}</div>
      </div>
    </div>

    <button class="btn-stop" onclick="stopCharge()">⏹ Arrêter la recharge</button>
  `;

  // Timer live
  if (state.elapsedInterval) clearInterval(state.elapsedInterval);
  state.elapsedInterval = setInterval(() => {
    const eDisp = el("elapsedDisplay");
    const cDisp = el("costDisplay");
    if (eDisp) eDisp.textContent = elapsed(t);
    if (cDisp) {
      const m = elapsedMinutes(t);
      cDisp.textContent = fmtCost(COST_PER_MINUTE * m);
    }
  }, 1000);
}

async function stopCharge() {
  if (state.elapsedInterval) clearInterval(state.elapsedInterval);

  state.endDureeMin = Math.round(elapsedMinutes(state.chargeStartTime) * 10) / 10;
  state.endCostEstime = Math.round(COST_PER_MINUTE * state.endDureeMin * 100) / 100;
  state.compteurKwh = "";
  state.previousCompteur = null;

  // Charger le dernier relevé pour ce point
  state.screen = "end";
  render();
  try {
    state.previousCompteur = await getLastCompteur(state.selectedPoint);
  } catch (e) {
    console.error("Erreur récupération dernier compteur:", e);
  }
  // Re-render pour afficher le dernier relevé connu
  renderEnd();
}

// ECRAN FIN DE CHARGE — Saisie du relevé compteur
// ============================================================
function renderEnd() {
  const t = state.chargeStartTime;
  const prevLabel = state.previousCompteur !== null
    ? `Dernier relevé ${state.selectedPoint} : <strong>${state.previousCompteur.toFixed(1)} kWh</strong>`
    : "Aucun relevé précédent trouvé";

  const compteurValid = state.compteurKwh && parseFloat(state.compteurKwh) > 0 &&
    (state.previousCompteur === null || parseFloat(state.compteurKwh) > state.previousCompteur);

  el("screenEnd").innerHTML = `
    <div style="background:var(--color-bg-2);border-radius:var(--radius-md);padding:1rem;margin-bottom:1.25rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;color:var(--color-text-secondary)">Récapitulatif — ${state.selectedPoint}</span>
        <span style="font-size:13px;font-weight:500">${fmtDuration(state.endDureeMin)}</span>
      </div>
      <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:3px">Début : ${fmtTime(t)} → Fin : ${fmtTime(new Date())}</div>
      <div style="font-size:13px;color:var(--color-text-secondary)">${state.currentUser.nom}</div>
    </div>

    <div class="mb-4">
      <label class="field-label">Relevé du compteur ${state.selectedPoint} (kWh) <span style="color:var(--red)">*</span></label>
      <input type="number" inputmode="decimal" step="0.1" id="compteurInput"
             placeholder="Ex : 1234.5" value="${state.compteurKwh}"
             oninput="onCompteurInput(this.value)"
             style="font-family:var(--font-mono);font-size:18px;text-align:center;${!compteurValid && state.compteurKwh ? 'border-color:var(--red)' : ''}">
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px;line-height:1.5">
        ${prevLabel}<br>
        Relevé obligatoire — indiquez le nombre affiché sur le compteur de la borne.
      </div>
      <div id="compteurError" style="font-size:12px;color:var(--red);margin-top:4px;${compteurValid || !state.compteurKwh ? 'display:none' : ''}">
        ${state.compteurKwh && state.previousCompteur !== null && parseFloat(state.compteurKwh) <= state.previousCompteur ? "La valeur doit être supérieure au dernier relevé (" + state.previousCompteur.toFixed(1) + " kWh)" : ""}
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-back" onclick="cancelEnd()">Reprendre</button>
      <button class="btn-login" style="flex:2" id="btnConfirmEnd" onclick="confirmEnd()" ${!compteurValid ? "disabled" : ""}>
        Confirmer la fin
      </button>
    </div>
  `;
}

function onCompteurInput(val) {
  state.compteurKwh = val;
  const compteur = parseFloat(val);
  const valid = val && compteur > 0 && (state.previousCompteur === null || compteur > state.previousCompteur);
  const btn = el("btnConfirmEnd");
  if (btn) btn.disabled = !valid;

  const errEl = el("compteurError");
  if (errEl) {
    if (val && state.previousCompteur !== null && compteur <= state.previousCompteur) {
      errEl.textContent = "La valeur doit être supérieure au dernier relevé (" + state.previousCompteur.toFixed(1) + " kWh)";
      errEl.style.display = "";
    } else {
      errEl.style.display = "none";
    }
  }

  const input = el("compteurInput");
  if (input) input.style.borderColor = (!valid && val) ? "var(--red)" : "";
}

function cancelEnd() {
  state.screen = "charging";
  render();
}

async function confirmEnd() {
  const compteur = state.compteurKwh ? parseFloat(state.compteurKwh) : null;
  if (compteur === null || compteur <= 0) return;
  if (state.previousCompteur !== null && compteur <= state.previousCompteur) return;

  const btn = el("btnConfirmEnd");
  if (btn) { btn.disabled = true; btn.textContent = "Enregistrement..."; }

  // Calcul conso réelle
  let consoReelle = null;
  let coutReel = null;
  if (compteur !== null && state.previousCompteur !== null && compteur > state.previousCompteur) {
    consoReelle = Math.round((compteur - state.previousCompteur) * 10) / 10;
    coutReel = Math.round(consoReelle * COST_PER_KWH * 100) / 100;
  }

  try {
    await closeCharge(state.chargeRecordId, state.endDureeMin, state.endCostEstime, compteur, consoReelle, coutReel);
    state.summary = {
      dateDebut: state.chargeStartTime,
      dateFin: new Date().toISOString(),
      dureeMin: state.endDureeMin,
      cost: state.endCostEstime,
      compteurKwh: compteur,
      previousCompteur: state.previousCompteur,
      consoReelle,
      coutReel,
      point: state.selectedPoint
    };
    state.chargeStartTime = null;
    state.chargeRecordId = null;
    state.screen = "summary";
    render();
  } catch (e) {
    alert("Erreur lors de l'enregistrement.");
    console.error(e);
    if (btn) { btn.disabled = false; btn.textContent = "Confirmer la fin"; }
  }
}

function renderHistory() {
  const searchEl = el("historySearch");
  const search = (searchEl?.value || "").toLowerCase();

  const filtered = state.history.filter(c =>
    !search || fmtDate(c.dateDebut).includes(search) || fmtCost(c.cout).toLowerCase().includes(search) || (c.point && c.point.toLowerCase().includes(search))
  );

  // Calcul du total (coût réel si dispo, sinon estimé)
  const totalCost = filtered.reduce((sum, c) => {
    if (c.consoReelle) return sum + (c.consoReelle * COST_PER_KWH);
    return sum + (c.cout || 0);
  }, 0);
  const totalDuration = filtered.reduce((sum, c) => sum + (c.duree || 0), 0);
  const totalConsoReelle = filtered.reduce((sum, c) => sum + (c.consoReelle || 0), 0);

  const statsHtml = filtered.length > 0 ? `
    <div style="display:flex;gap:8px;margin-bottom:1rem">
      <div style="flex:1;background:var(--blue-bg);border-radius:var(--radius-md);padding:0.65rem 0.75rem;text-align:center">
        <div style="font-size:11px;color:var(--blue-dark);opacity:0.7;margin-bottom:2px">Total coût</div>
        <div style="font-size:15px;font-weight:600;color:var(--blue-dark);font-family:var(--font-mono)">${fmtCost(totalCost)}</div>
      </div>
      <div style="flex:1;background:var(--green-bg);border-radius:var(--radius-md);padding:0.65rem 0.75rem;text-align:center">
        <div style="font-size:11px;color:var(--green-dark);opacity:0.7;margin-bottom:2px">Total kWh</div>
        <div style="font-size:15px;font-weight:600;color:var(--green-dark);font-family:var(--font-mono)">${totalConsoReelle.toFixed(1)}</div>
      </div>
      <div style="flex:1;background:var(--color-bg-2);border-radius:var(--radius-md);padding:0.65rem 0.75rem;text-align:center">
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:2px">Durée</div>
        <div style="font-size:15px;font-weight:600">${fmtDuration(totalDuration)}</div>
      </div>
    </div>` : "";

  const resultsHtml = filtered.length === 0
    ? `<p style="text-align:center;padding:2rem;font-size:13px;color:var(--color-text-tertiary)">Aucune recharge enregistrée</p>`
    : filtered.map(c => {
        const coutReel = c.consoReelle ? (c.consoReelle * COST_PER_KWH) : null;
        return `
      <div class="history-item">
        <div class="history-icon">⚡</div>
        <div style="flex:1;min-width:0">
          <div class="history-name">${c.consoReelle ? c.consoReelle.toFixed(1) + " kWh" : fmtDuration(c.duree)}${c.point ? ` · ${c.point}` : ""}</div>
          <div class="history-meta">${fmtTime(c.dateDebut)}${c.dateFin ? " → " + fmtTime(c.dateFin) : " · en cours"} · ${fmtDuration(c.duree)}</div>
        </div>
        <div class="history-right">
          <div class="history-date">${fmtDate(c.dateDebut)}</div>
          <div class="history-cost">${coutReel ? fmtCost(coutReel) : (c.cout ? "~" + fmtCost(c.cout) : "—")}</div>
        </div>
      </div>`;
      }).join("");

  // Si le champ de recherche existe déjà, ne mettre à jour que les résultats
  const resultsEl = el("historyResults");
  if (resultsEl && searchEl) {
    resultsEl.innerHTML = `
      <div class="history-count">${filtered.length} recharge${filtered.length > 1 ? "s" : ""}</div>
      ${statsHtml}
      ${resultsHtml}`;
  } else {
    el("screenHistory").innerHTML = `
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="historySearch" value="${search}" placeholder="Rechercher par date..." oninput="renderHistory()">
      </div>
      <div id="historyResults">
        <div class="history-count">${filtered.length} recharge${filtered.length > 1 ? "s" : ""}</div>
        ${statsHtml}
        ${resultsHtml}
      </div>
    `;
  }
}

// ============================================================
// INIT
// ============================================================
try {
  render();
} catch (e) {
  var errDiv = document.createElement("div");
  errDiv.style.cssText = "padding:2rem 1rem;text-align:center";
  errDiv.innerHTML = '<p style="color:#D85A30;font-weight:500;margin-bottom:8px">Erreur au démarrage</p>' +
    '<p style="font-size:12px;color:#888;word-break:break-all">' + e.message + "</p>";
  document.querySelector(".app").appendChild(errDiv);
  console.error("Init error:", e);
}
</script>
</body>
</html>
